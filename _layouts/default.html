<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body>
    <div class="wrapper">
      <header>

        <!-- Profile picture -->
        <a href="{{ '/' | absolute_url }}" class="sidebar-avatar-link">
          <img
            src="https://avatars.githubusercontent.com/{{ site.github_username | escape }}"
            alt="{{ site.title | escape }}"
            class="sidebar-avatar"
          />
        </a>

        <!-- Name + title -->
        <h1 class="sidebar-name">
          <a href="{{ '/' | absolute_url }}">{{ site.title | escape }}</a>
        </h1>
        <p class="sidebar-title">{{ site.description | strip_newlines | strip | escape }}</p>

        <!-- Nav links -->
        <nav class="sidebar-nav">
          <a class="sidebar-nav-link{% if page.url == '/' %} active{% endif %}" href="{{ '/' | absolute_url }}">
            <svg class="sidebar-nav-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            Home
          </a>
          <a class="sidebar-nav-link{% if page.url == '/stats/' %} active{% endif %}" href="{{ '/stats/' | relative_url }}">
            <svg class="sidebar-nav-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            Stats
          </a>
        </nav>

        <!-- Social links -->
        <div class="sidebar-social">
          <a class="sidebar-social-link" href="https://github.com/{{ site.github_username | escape }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <svg class="sidebar-social-icon" viewBox="0 0 16 16" aria-hidden="true" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
          </a>
          <a class="sidebar-social-link" href="https://www.linkedin.com/in/{{ site.linkedin_username | escape }}/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <svg class="sidebar-social-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037
                -1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046
                c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337
                7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782
                13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542
                C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729
                C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
          </a>
        </div>

      </header>
      <section>

      {{ content }}

      </section>
      <footer>
        <p><small>Hosted on GitHub Pages &mdash;</small></p>
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
